<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>Siliu Browser</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, sans-serif; background: #f5f5f5; }
    
    /* 工具栏 */
    .toolbar {
      height: 80px;
      background: white;
      border-bottom: 1px solid #ddd;
      display: flex;
      align-items: center;
      padding: 0 20px;
      gap: 10px;
    }
    
    .toolbar input {
      flex: 1;
      height: 40px;
      padding: 0 15px;
      border: 1px solid #ddd;
      border-radius: 20px;
      font-size: 14px;
    }
    
    .toolbar button {
      padding: 10px 20px;
      border: none;
      background: #007AFF;
      color: white;
      border-radius: 20px;
      cursor: pointer;
    }
    
    /* 侧边栏 */
    .sidebar {
      position: fixed;
      right: 0;
      top: 80px;
      width: 360px;
      height: calc(100vh - 80px);
      background: white;
      border-left: 1px solid #ddd;
      display: flex;
      flex-direction: column;
    }
    
    .sidebar-header {
      padding: 15px;
      border-bottom: 1px solid #ddd;
      font-weight: bold;
    }
    
    .chat-container {
      flex: 1;
      overflow-y: auto;
      padding: 15px;
    }
    
    .chat-input {
      padding: 15px;
      border-top: 1px solid #ddd;
    }
    
    .chat-input textarea {
      width: 100%;
      height: 60px;
      padding: 10px;
      border: 1px solid #ddd;
      border-radius: 8px;
      resize: none;
    }
    
    .chat-input button {
      width: 100%;
      margin-top: 10px;
      padding: 10px;
      border: none;
      background: #007AFF;
      color: white;
      border-radius: 8px;
      cursor: pointer;
    }
    
    /* 消息 */
    .message {
      margin-bottom: 15px;
      padding: 10px;
      border-radius: 8px;
    }
    
    .message.user {
      background: #007AFF;
      color: white;
      margin-left: 20px;
    }
    
    .message.assistant {
      background: #f0f0f0;
      margin-right: 20px;
    }
  </style>
</head>
<body>
  <!-- 工具栏 -->
  <div class="toolbar">
    <button onclick="goBack()">←</button>
    <button onclick="goForward()">→</button>
    <button onclick="reload()">↻</button>
    <input type="text" id="address" placeholder="输入网址..." onkeydown="if(event.key==='Enter') navigate()">
    <button onclick="navigate()">前往</button>
  </div>
  
  <!-- 侧边栏 Copilot -->
  <div class="sidebar">
    <div class="sidebar-header">Siliu Copilot</div>
    <div class="chat-container" id="chat">
      <div class="message assistant">你好！我是 Siliu Copilot，可以帮你操作浏览器。</div>
    </div>
    <div class="chat-input">
      <textarea id="chat-input" placeholder="输入指令..."></textarea>
      <button onclick="sendMessage()">发送</button>
    </div>
  </div>
  
  <script>
    // 导航
    async function navigate() {
      const url = document.getElementById('address').value;
      if (url) {
        await window.siliuAPI?.navigate?.(url);
      }
    }
    
    // 发送消息
    async function sendMessage() {
      const input = document.getElementById('chat-input');
      const text = input.value.trim();
      if (!text) return;
      
      // 显示用户消息
      const chat = document.getElementById('chat');
      const userMsg = document.createElement('div');
      userMsg.className = 'message user';
      userMsg.textContent = text;
      chat.appendChild(userMsg);
      input.value = '';
      
      // TODO: 发送到 OpenClaw
      console.log('Send to OpenClaw:', text);
    }
    
    function goBack() { window.siliuAPI?.goBack?.(); }
    function goForward() { window.siliuAPI?.goForward?.(); }
    function reload() { window.siliuAPI?.reload?.(); }
  </script>
</body>
</html>
